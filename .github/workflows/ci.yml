name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Astro check
        run: yarn check

      - name: Lint
        run: yarn lint

      - name: TypeScript check
        run: yarn tsc --noEmit

      - name: Format check
        run: yarn prettier --check .

      - name: Build
        run: yarn build
